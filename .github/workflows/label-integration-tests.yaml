name: Label integration-tests PRs
on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  label-integration-tests:
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - name: Check if all changed files are under integration-tests/backend
      id: check-files
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
      with:
        script: |
          const { data: files } = await github.rest.pulls.listFiles({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.payload.pull_request.number,
            per_page: 100,
          });
          const allUnderIntegrationTests = files.every(f =>
            f.filename.startsWith('integration-tests/backend/')
          );
          core.setOutput('match', allUnderIntegrationTests ? 'true' : 'false');

    - name: Add integration-tests label
      if: steps.check-files.outputs.match == 'true'
      run: gh pr edit "$NUMBER" --add-label "integration-tests"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
        NUMBER: ${{ github.event.pull_request.number }}
